# Watch ggml-org/llama.cpp for new b* tags and optionally dispatch promote.
#
# Default policy:
#   - Hourly cron detects newer upstream tags
#   - Cron publishes ready runtimes, then attaches linux-x64-cuda when built
#   - Incomplete releases dispatch a missing-asset repair instead of a full rebuild
#   - Manual dispatch can run an artifact-only dry run
#
name: RealTimeX Watch Upstream

on:
  schedule:
    # Hourly (offset to avoid top-of-hour pileups)
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      dispatch_promote:
        description: "If a new tag is found, dispatch realtimex-promote-runtime (dry-run unless publish=true)"
        type: boolean
        default: true
      publish:
        description: "When dispatching promote, also publish realtimex-bNNNN (prefer false)"
        type: boolean
        default: false
      build_linux_cuda_x64:
        description: "When dispatching promote, build linux-x64-cuda"
        type: boolean
        default: true
      build_linux_cuda_arm64:
        description: "When dispatching promote, build linux-arm64-cuda"
        type: boolean
        default: true
      force_tag:
        description: "Optional: check this bNNNN instead of the latest upstream tag"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: realtimex-watch-upstream
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"

jobs:
  watch:
    name: Check upstream llama.cpp
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.compare.outputs.updated }}
      latestUpstream: ${{ steps.compare.outputs.latestUpstream }}
      latestPromoted: ${{ steps.compare.outputs.latestPromoted }}
      releaseTag: ${{ steps.compare.outputs.releaseTag }}
      releaseComplete: ${{ steps.compare.outputs.releaseComplete }}
      releaseState: ${{ steps.compare.outputs.releaseState }}
      repairExisting: ${{ steps.compare.outputs.repairExisting }}
      should_dispatch: ${{ steps.decide.outputs.should_dispatch }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          sparse-checkout: |
            realtimex
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Compare upstream vs promoted
        id: compare
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_TAG: ${{ inputs.force_tag }}
          PACKAGING_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          FORCE="${FORCE_TAG}"
          FORCE="$(echo "$FORCE" | tr -d '[:space:]')"

          python3 realtimex/scripts/watch_upstream.py \
            --upstream-repo ggml-org/llama.cpp \
            --packaging-repo "${PACKAGING_REPO}" \
            --token "${GITHUB_TOKEN}" \
            --force-tag "${FORCE}" \
            --github-output

      - name: Job summary
        env:
          UPDATED: ${{ steps.compare.outputs.updated }}
          LATEST: ${{ steps.compare.outputs.latestUpstream }}
          PROMOTED: ${{ steps.compare.outputs.latestPromoted }}
          REL: ${{ steps.compare.outputs.releaseTag }}
          COMPLETE: ${{ steps.compare.outputs.releaseComplete }}
          RELEASE_STATE: ${{ steps.compare.outputs.releaseState }}
          REPAIR: ${{ steps.compare.outputs.repairExisting }}
        run: |
          set -euo pipefail
          {
            echo "## RealTimeX watch upstream"
            echo ""
            echo "- Upstream latest: \`${LATEST}\`"
            echo "- Promoted latest: \`${PROMOTED:-none}\`"
            echo "- Update needed: \`${UPDATED}\`"
            echo "- Release complete: \`${COMPLETE}\`"
            echo "- Release state: \`${RELEASE_STATE}\`"
            echo "- Repair existing: \`${REPAIR}\`"
            echo "- Release tag would be: \`${REL}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Decide dispatch
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          UPDATED: ${{ steps.compare.outputs.updated }}
          WANT_MANUAL: ${{ inputs.dispatch_promote }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            WANT="$WANT_MANUAL"
          else
            WANT="true"
          fi

          if [[ "$UPDATED" == "true" && "$WANT" == "true" ]]; then
            echo "should_dispatch=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
          fi

  dispatch-promote:
    name: Dispatch promote ${{ needs.watch.outputs.latestUpstream }}
    needs: watch
    if: needs.watch.outputs.should_dispatch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Dispatch realtimex-promote-runtime
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.watch.outputs.latestUpstream }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PUBLISH_REQUESTED: ${{ inputs.publish }}
          BUILD_CUDA_X64: ${{ inputs.build_linux_cuda_x64 }}
          BUILD_CUDA_ARM64: ${{ inputs.build_linux_cuda_arm64 }}
          REPAIR_EXISTING: ${{ needs.watch.outputs.repairExisting }}
        run: |
          set -euo pipefail
          # Normalize boolean-ish inputs to true/false strings for workflow inputs
          if [[ "${EVENT_NAME}" == "schedule" || "${PUBLISH_REQUESTED}" == "true" ]]; then
            PUBLISH_FLAG=true
          else
            PUBLISH_FLAG=false
          fi
          if [[ "${REPAIR_EXISTING}" == "true" ]]; then
            CUDA_X64_FLAG=true
            CUDA_ARM64_FLAG=false
          elif [[ "${BUILD_CUDA_X64}" == "false" ]]; then
            CUDA_X64_FLAG=false
            if [[ "${BUILD_CUDA_ARM64}" == "false" ]]; then
              CUDA_ARM64_FLAG=false
            else
              CUDA_ARM64_FLAG=true
            fi
          else
            CUDA_X64_FLAG=true
            if [[ "${BUILD_CUDA_ARM64}" == "false" ]]; then
              CUDA_ARM64_FLAG=false
            else
              CUDA_ARM64_FLAG=true
            fi
          fi

          active="$(gh run list --repo "${REPO}" \
            --workflow realtimex-promote-runtime.yml --limit 20 \
            --json displayTitle,status \
            --jq ".[] | select(.displayTitle == \"RealTimeX Promote ${TAG}\" and .status != \"completed\") | .status")"
          if [[ -n "$active" ]]; then
            echo "Promote for ${TAG} is already ${active}; skipping duplicate dispatch"
            echo "- Existing promote for \`${TAG}\` is \`${active}\`; duplicate dispatch skipped" \
              >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Dispatching promote for ${TAG} (publish=${PUBLISH_FLAG}, repair=${REPAIR_EXISTING}, linux_cuda_x64=${CUDA_X64_FLAG}, linux_cuda_arm64=${CUDA_ARM64_FLAG})"
          gh workflow run realtimex-promote-runtime.yml \
            --repo "${REPO}" \
            -f "llama_cpp_tag=${TAG}" \
            -f "publish=${PUBLISH_FLAG}" \
            -f "build_linux_cuda_x64=${CUDA_X64_FLAG}" \
            -f "build_linux_cuda_arm64=${CUDA_ARM64_FLAG}" \
            -f "fail_on_missing_official=false" \
            -f "repair_existing=${REPAIR_EXISTING}"

          {
            echo "## Dispatched promote"
            echo ""
            echo "- Tag: \`${TAG}\`"
            echo "- Publish: \`${PUBLISH_FLAG}\`"
            echo "- build_linux_cuda_x64: \`${CUDA_X64_FLAG}\`"
            echo "- build_linux_cuda_arm64: \`${CUDA_ARM64_FLAG}\`"
            echo "- repair_existing: \`${REPAIR_EXISTING}\`"
            echo ""
            echo "Monitor: https://github.com/${REPO}/actions/workflows/realtimex-promote-runtime.yml"
          } >> "$GITHUB_STEP_SUMMARY"
