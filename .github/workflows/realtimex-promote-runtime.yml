# RealTimeX: promote a pinned ggml-org/llama.cpp tag into managed llama-server zips.
#
# Hybrid strategy:
#   - Mirror/repack official GitHub release packs (mac/win/linux CPU+Vulkan, win CUDA)
#   - Self-build gaps (linux CUDA ARM64 before publish, x64 attached later)
#   - Inject RealTimeX _nlcBuildMetadata.json compatible with the app downloader
#
# Usage:
#   gh workflow run realtimex-promote-runtime.yml -f llama_cpp_tag=b10012 -f publish=true
#
name: RealTimeX Promote Runtime
run-name: RealTimeX Promote ${{ inputs.llama_cpp_tag }}

on:
  workflow_dispatch:
    inputs:
      llama_cpp_tag:
        description: "ggml-org/llama.cpp release tag (e.g. b10012)"
        required: true
        type: string
      publish:
        description: "Create GitHub release realtimex-<tag> and upload assets"
        required: false
        type: boolean
        default: false
      build_linux_cuda_x64:
        description: "Build and incrementally attach linux-x64-cuda"
        required: false
        type: boolean
        default: true
      build_linux_cuda_arm64:
        description: "Build linux-arm64-cuda (Jetson Orin SM87 + DGX Spark SM121)"
        required: false
        type: boolean
        default: true
      fail_on_missing_official:
        description: "Fail the whole matrix if an official upstream asset is missing"
        required: false
        type: boolean
        default: false
      repair_existing:
        description: "Repair an existing assembling release (watcher use)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: realtimex-promote-runtime-${{ inputs.llama_cpp_tag }}
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"
  REALTIMEX_SCRIPTS: realtimex/scripts

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.normalize.outputs.tag }}
      release_tag: ${{ steps.normalize.outputs.release_tag }}
      release_exists: ${{ steps.inspect.outputs.release_exists }}
      x64_exists: ${{ steps.inspect.outputs.x64_exists }}
      release_complete: ${{ steps.inspect.outputs.release_complete }}
      release_state: ${{ steps.inspect.outputs.release_state }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          sparse-checkout: |
            realtimex
          sparse-checkout-cone-mode: true

      - name: Normalize / validate tag
        id: normalize
        env:
          RAW_TAG: ${{ inputs.llama_cpp_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$(printf '%s' "$RAW_TAG" | tr -d '[:space:]')"
          if [[ ! "$tag" =~ ^b[0-9]+$ ]]; then
            echo "Invalid tag: $tag (expected bNNNN)"
            exit 1
          fi
          # Ensure the upstream release exists
          code="$(curl -fsS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/ggml-org/llama.cpp/releases/tags/${tag}" || true)"
          if [[ "$code" != "200" ]]; then
            echo "Upstream release not found: ggml-org/llama.cpp@${tag} (HTTP ${code})"
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_tag=realtimex-${tag}" >> "$GITHUB_OUTPUT"
          echo "Promoting llama.cpp ${tag} -> release realtimex-${tag}"

      - name: Inspect existing release
        id: inspect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.normalize.outputs.release_tag }}
          TAG: ${{ steps.normalize.outputs.tag }}
          REPAIR_EXISTING: ${{ inputs.repair_existing }}
          PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          release_exists=false
          x64_exists=false
          release_complete=false
          release_state=absent
          if gh release view "${RELEASE_TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            release_exists=true
            assets="$(gh release view "${RELEASE_TAG}" --repo "${REPO}" --json assets --jq '.assets[].name')"
            printf '%s\n' "$assets" > existing-release-assets.txt
            if grep -Fxq "llama-server-linux-x64-cuda-${TAG}.zip" <<< "$assets"; then
              x64_exists=true
            fi
            mkdir -p existing-release
            manifest_args=()
            if grep -Fxq runtime-manifest.json <<< "$assets"; then
              if ! gh release download "${RELEASE_TAG}" --repo "${REPO}" \
                --pattern runtime-manifest.json --dir existing-release >/dev/null 2>&1; then
                echo "Could not inspect runtime-manifest.json for ${RELEASE_TAG}; refusing to mutate it"
                exit 1
              fi
              manifest_args+=(--manifest existing-release/runtime-manifest.json)
            fi
            python3 realtimex/scripts/runtime_release_state.py \
              --tag "${TAG}" \
              --assets-file existing-release-assets.txt \
              "${manifest_args[@]}" \
              --github-output > existing-release-state.json
            release_state="$(jq -r '.state' existing-release-state.json)"
            release_complete="$(jq -r '.complete' existing-release-state.json)"
            if [[ "$release_state" == "invalid" ]]; then
              echo "Existing release metadata is invalid; refusing automatic repair"
              cat existing-release-state.json
              exit 1
            fi
          fi

          echo "release_exists=${release_exists}" >> "$GITHUB_OUTPUT"
          echo "x64_exists=${x64_exists}" >> "$GITHUB_OUTPUT"
          if [[ "$release_exists" != "true" ]]; then
            echo "release_complete=${release_complete}" >> "$GITHUB_OUTPUT"
            echo "release_state=${release_state}" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$REPAIR_EXISTING" == "true" ]]; then
            if [[ "$release_exists" != "true" ]]; then
              echo "Repair requested, but ${RELEASE_TAG} does not exist"
              exit 1
            fi
            if [[ "$release_complete" == "true" ]]; then
              echo "Release ${RELEASE_TAG} became complete while the repair was queued; nothing to do"
            fi
          elif [[ "$PUBLISH" == "true" && "$release_exists" == "true" ]]; then
            echo "Release ${RELEASE_TAG} already exists; use repair_existing for an assembling release"
            exit 1
          fi

      - name: Validate publish matrix
        if: inputs.publish
        env:
          BUILD_CUDA_X64: ${{ inputs.build_linux_cuda_x64 }}
          BUILD_CUDA_ARM64: ${{ inputs.build_linux_cuda_arm64 }}
          REPAIR_EXISTING: ${{ inputs.repair_existing }}
        run: |
          set -euo pipefail
          if [[ "$BUILD_CUDA_X64" != "true" ]]; then
            echo "Publishing requires the Linux x64 CUDA build or repair check"
            exit 1
          fi
          if [[ "$REPAIR_EXISTING" != "true" && "$BUILD_CUDA_ARM64" != "true" ]]; then
            echo "Initial publication requires the Linux ARM64 CUDA build"
            exit 1
          fi

  repack-official:
    name: Repack ${{ matrix.id }}
    needs: validate-tag
    if: ${{ ! inputs.repair_existing }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ inputs.fail_on_missing_official == false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: darwin-arm64
          - id: darwin-x64
          - id: linux-x64
          - id: linux-arm64
          - id: linux-x64-vulkan
          - id: linux-arm64-vulkan
          - id: win32-x64
          - id: win32-arm64
          - id: win32-x64-cuda
          - id: win32-x64-vulkan
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          sparse-checkout: |
            realtimex
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Repack official asset
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
          MATRIX_ID: ${{ matrix.id }}
        run: |
          set -euo pipefail
          mkdir -p realtimex-dist realtimex-work
          python3 "${REALTIMEX_SCRIPTS}/repack_official_runtime.py" \
            --tag "${TAG}" \
            --matrix-id "${MATRIX_ID}" \
            --work-dir realtimex-work \
            --out-dir realtimex-dist

      - name: Upload dist artifact
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-${{ matrix.id }}
          path: realtimex-dist/*.zip
          if-no-files-found: error
          retention-days: 1

  build-linux-cuda-x64:
    name: Build linux-x64-cuda
    needs: validate-tag
    if: >-
      inputs.build_linux_cuda_x64
      && (! inputs.repair_existing || needs.validate-tag.outputs.x64_exists != 'true')
    continue-on-error: ${{ inputs.publish && ! inputs.repair_existing }}
    outputs:
      ready: ${{ steps.ready.outputs.ready }}
    runs-on: ubuntu-22.04
    # Multi-arch CUDA is the bottleneck; keep this job focused.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ needs.validate-tag.outputs.tag }}
          path: llama.cpp
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          sparse-checkout: |
            realtimex
          sparse-checkout-cone-mode: true
          path: packaging

      - name: Install build deps
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            build-essential cmake ninja-build ccache

      # Cache toolkit downloads between runs (large win on cold runners)
      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@b6fc3a9f3f15256d9d94ffe1254f9c5a2565cde6 # v0.2.30
        with:
          cuda: "12.4.0"
          method: network
          use-github-cache: true

      - name: ccache
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2
        with:
          key: linux-x64-cuda-${{ needs.validate-tag.outputs.tag }}
          restore-keys: |
            linux-x64-cuda-
          max-size: 2G

      # llama-server lives under tools/; LLAMA_BUILD_TOOLS must be ON.
      # Speed notes:
      # - Build real SASS for common deployed generations.
      # - Keep PTX for the highest architecture to provide forward compatibility.
      # - Build only target llama-server (not full tools suite).
      # - ccache speeds rebuilds when the same tag/re-run hits similar objects.
      - name: Configure & build llama-server
        working-directory: llama.cpp
        env:
          CMAKE_CUDA_ARCHITECTURES: "75-real;80-real;86-real;89-real;90"
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
          CMAKE_CUDA_COMPILER_LAUNCHER: ccache
          CCACHE_SLOPPINESS: "pch_defines,time_macros"
        run: |
          set -euo pipefail
          ccache -z || true
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CUDA_COMPILER_LAUNCHER=ccache \
            -DGGML_CUDA=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_CCACHE=ON \
            -DCMAKE_CUDA_ARCHITECTURES="${CMAKE_CUDA_ARCHITECTURES}" \
            -DLLAMA_BUILD_COMMON=ON \
            -DLLAMA_BUILD_TOOLS=ON \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_APP=OFF \
            -DLLAMA_BUILD_UI=ON \
            -DLLAMA_USE_PREBUILT_UI=ON
          if ! cmake --build build --target help 2>/dev/null | grep -qE '^llama-server:'; then
            echo "error: cmake target llama-server was not generated"
            cmake --build build --target help 2>/dev/null | head -100 || true
            exit 1
          fi
          # Only build llama-server + its deps (not every tool under tools/)
          cmake --build build --config Release --target llama-server -j"$(nproc)"
          find build -name 'llama-server' -type f -print
          ccache -s || true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Package runtime zip
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p realtimex-dist
          python3 packaging/realtimex/scripts/package_built_runtime.py \
            --tag "${TAG}" \
            --matrix-id linux-x64-cuda \
            --out-dir realtimex-dist \
            --build-dir llama.cpp/build

      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-linux-x64-cuda
          path: realtimex-dist/*.zip
          if-no-files-found: error
          retention-days: 1

      - name: Mark x64 CUDA artifact ready
        id: ready
        run: echo "ready=true" >> "$GITHUB_OUTPUT"

  build-linux-cuda-arm64:
    name: Build linux-arm64-cuda
    needs: validate-tag
    if: inputs.build_linux_cuda_arm64 && ! inputs.repair_existing
    runs-on: [self-hosted, Linux, ARM64, dgx-spark, llama-cpp]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ needs.validate-tag.outputs.tag }}
          path: llama.cpp
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          sparse-checkout: |
            realtimex
          sparse-checkout-cone-mode: true
          path: packaging

      - name: Verify DGX Spark build environment
        run: |
          set -euo pipefail
          test -x /usr/local/cuda-13.0/bin/nvcc
          export PATH="/usr/local/cuda-13.0/bin:$PATH"
          echo "/usr/local/cuda-13.0/bin" >> "$GITHUB_PATH"
          echo "CUDACXX=/usr/local/cuda-13.0/bin/nvcc" >> "$GITHUB_ENV"
          echo "CUDA_HOME=/usr/local/cuda-13.0" >> "$GITHUB_ENV"
          cmake --version
          ninja --version
          nvcc --version
          nvcc --list-gpu-code | grep -Fx sm_87
          nvcc --list-gpu-code | grep -Fx sm_121

      - name: Configure & build llama-server
        working-directory: llama.cpp
        env:
          CMAKE_CUDA_ARCHITECTURES: "87-real;121a-real"
        run: |
          set -euo pipefail
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_CUDA=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_CCACHE=OFF \
            -DCMAKE_CUDA_ARCHITECTURES="${CMAKE_CUDA_ARCHITECTURES}" \
            -DLLAMA_BUILD_COMMON=ON \
            -DLLAMA_BUILD_TOOLS=ON \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_APP=OFF
          if ! cmake --build build --target help 2>/dev/null | grep -qE '^llama-server:'; then
            echo "error: cmake target llama-server was not generated"
            cmake --build build --target help 2>/dev/null | head -100 || true
            exit 1
          fi
          cmake --build build --config Release --target llama-server -j"$(nproc)"
          find build -name 'llama-server' -type f -print

      - name: Smoke CUDA runtime on DGX Spark
        working-directory: llama.cpp
        run: |
          set -euo pipefail
          build/bin/llama-server --version
          devices="$(build/bin/llama-server --list-devices)"
          echo "$devices"
          grep -q 'CUDA0: NVIDIA GB10' <<< "$devices"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Package runtime zip
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p realtimex-dist
          rm -f realtimex-dist/*.zip
          python3 packaging/realtimex/scripts/package_built_runtime.py \
            --tag "${TAG}" \
            --matrix-id linux-arm64-cuda \
            --build-dir llama.cpp/build \
            --out-dir realtimex-dist

      - name: Upload dist artifact
        id: upload_arm64
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-linux-arm64-cuda
          path: realtimex-dist/llama-server-linux-arm64-cuda-${{ needs.validate-tag.outputs.tag }}.zip
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

      - name: Retry dist artifact upload
        if: steps.upload_arm64.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-linux-arm64-cuda
          path: realtimex-dist/llama-server-linux-arm64-cuda-${{ needs.validate-tag.outputs.tag }}.zip
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true

  assemble-base:
    name: Assemble base runtime artifacts
    needs:
      - validate-tag
      - repack-official
      - build-linux-cuda-arm64
    outputs:
      complete: ${{ steps.collect.outputs.complete }}
      ready: ${{ steps.collect.outputs.ready }}
    # Publish all ready platforms without waiting for the slow x64 CUDA build.
    if: >-
      always()
      && !cancelled()
      && inputs.publish
      && ! inputs.repair_existing
      && needs.validate-tag.result == 'success'
      && (
        needs.repack-official.result == 'success'
        || needs.repack-official.result == 'failure'
      )
      && needs.build-linux-cuda-arm64.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          sparse-checkout: |
            realtimex
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Download all runtime artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: runtime-*
          merge-multiple: true

      - name: Collect zips
        id: collect
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
          RELEASE_TAG: ${{ needs.validate-tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p realtimex-dist
          # download-artifact with merge-multiple may place files flat or nested
          find artifacts -type f -name 'llama-server-*.zip' -print0 | while IFS= read -r -d '' f; do
            cp -f "$f" realtimex-dist/
          done
          echo "Collected assets:"
          ls -lh realtimex-dist || true
          count="$(find realtimex-dist -type f -name 'llama-server-*.zip' | wc -l | tr -d ' ')"
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          if [[ "$count" -lt 1 ]]; then
            echo "No runtime zips collected"
            exit 1
          fi

          manifest_args=(
            "${REALTIMEX_SCRIPTS}/build_runtime_manifest.py"
            --dist-dir realtimex-dist
            --tag "${RELEASE_TAG}"
            --llama-cpp-release "${TAG}"
            --out realtimex-dist/runtime-manifest.json
            --require-official
            --require-matrix-id linux-arm64-cuda
            --allow-missing-matrix-id linux-x64-cuda
            --github-output
          )
          python3 "${manifest_args[@]}"

          {
            echo "## RealTimeX runtime promote"
            echo ""
            echo "- llama.cpp: \`${TAG}\`"
            echo "- release tag: \`${RELEASE_TAG}\`"
            echo "- assets: ${count}"
            echo ""
            echo '```json'
            cat realtimex-dist/runtime-manifest.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report runtime completeness
        env:
          COMPLETE: ${{ steps.collect.outputs.complete }}
          READY: ${{ steps.collect.outputs.ready }}
          EXPECTED_COUNT: ${{ steps.collect.outputs.expectedCount }}
          MISSING_COUNT: ${{ steps.collect.outputs.missingCount }}
          BLOCKING_MISSING_COUNT: ${{ steps.collect.outputs.blockingMissingCount }}
        run: |
          set -euo pipefail
          echo "- Base ready: \`${READY}\`; complete: \`${COMPLETE}\` (${EXPECTED_COUNT} expected, ${MISSING_COUNT} missing, ${BLOCKING_MISSING_COUNT} blocking)" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined dist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: realtimex-runtime-base-${{ needs.validate-tag.outputs.tag }}
          path: |
            realtimex-dist/*.zip
            realtimex-dist/runtime-manifest.json
          if-no-files-found: error
          retention-days: 7

      - name: Reject base publication with blocking gaps
        if: steps.collect.outputs.ready != 'true'
        run: |
          echo "Base publication is missing assets other than late linux-x64-cuda"
          exit 1

  publish-base:
    name: Publish base ${{ needs.validate-tag.outputs.release_tag }}
    needs:
      - validate-tag
      - assemble-base
    if: >-
      always()
      && !cancelled()
      && inputs.publish
      && ! inputs.repair_existing
      && needs.validate-tag.result == 'success'
      && needs.assemble-base.result == 'success'
      && needs.assemble-base.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download combined dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: realtimex-runtime-base-${{ needs.validate-tag.outputs.tag }}
          path: realtimex-dist

      - name: Publish base GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.validate-tag.outputs.tag }}
          RELEASE_TAG: ${{ needs.validate-tag.outputs.release_tag }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          complete="$(jq -r '.complete' realtimex-dist/runtime-manifest.json)"
          if [[ "$complete" == "true" ]]; then
            status="complete"
          else
            status="assembling (linux-x64-cuda pending)"
          fi
          notes="$(mktemp)"
          cat > "$notes" <<EOF
          # RealTimeX llama-server runtime \`${RELEASE_TAG}\`

          Pinned upstream: [ggml-org/llama.cpp \`${TAG}\`](https://github.com/ggml-org/llama.cpp/releases/tag/${TAG})

          Status: **${status}**

          ## Contents
          Hybrid packaging for RealTimeX managed local LLM:
          - Official packs repacked with \`_nlcBuildMetadata.json\`
          - Self-built gaps (e.g. Linux CUDA) when enabled

          See \`runtime-manifest.json\` for the full asset list and digests.

          ## Asset naming
          \`\`\`
          llama-server-{platform}-{arch}[-{cuda|vulkan}]-${TAG}.zip
          \`\`\`
          Compatible with RealTimeX startup downloader and runtime status.
          EOF

          gh release create "${RELEASE_TAG}" realtimex-dist/* \
            --repo "${REPO}" \
            --target "${TARGET_SHA}" \
            --title "${RELEASE_TAG}" \
            --notes-file "$notes"

  finalize-x64-cuda:
    name: Finalize linux-x64-cuda
    needs:
      - validate-tag
      - build-linux-cuda-x64
      - publish-base
    if: >-
      always()
      && !cancelled()
      && inputs.publish
      && needs.validate-tag.result == 'success'
      && needs.validate-tag.outputs.release_complete != 'true'
      && (
        (inputs.repair_existing && needs.publish-base.result == 'skipped')
        || (! inputs.repair_existing && needs.publish-base.result == 'success')
      )
      && (
        needs.validate-tag.outputs.x64_exists == 'true'
        || needs.build-linux-cuda-x64.outputs.ready == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          sparse-checkout: |
            realtimex
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Download newly built x64 CUDA artifact
        if: needs.validate-tag.outputs.x64_exists != 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: runtime-linux-x64-cuda
          path: built-x64

      - name: Seal complete release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.validate-tag.outputs.tag }}
          RELEASE_TAG: ${{ needs.validate-tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          release_assets="$(gh release view "${RELEASE_TAG}" --repo "${REPO}" --json assets --jq '.assets[].name')"
          printf '%s\n' "$release_assets" > live-release-assets.txt
          mkdir -p live-release
          live_manifest_args=()
          if grep -Fxq runtime-manifest.json <<< "$release_assets"; then
            if ! gh release download "${RELEASE_TAG}" --repo "${REPO}" \
              --pattern runtime-manifest.json --dir live-release >/dev/null 2>&1; then
              echo "Could not re-check runtime-manifest.json; refusing to mutate ${RELEASE_TAG}"
              exit 1
            fi
            live_manifest_args+=(--manifest live-release/runtime-manifest.json)
          fi
          python3 "${REALTIMEX_SCRIPTS}/runtime_release_state.py" \
            --tag "${TAG}" \
            --assets-file live-release-assets.txt \
            "${live_manifest_args[@]}" > live-release-state.json
          live_state="$(jq -r '.state' live-release-state.json)"
          if [[ "$live_state" == "invalid" ]]; then
            echo "Live release metadata is invalid; refusing automatic mutation"
            cat live-release-state.json
            exit 1
          fi
          if [[ "$live_state" == "complete" ]]; then
            echo "Release ${RELEASE_TAG} is already complete and immutable" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          mkdir -p realtimex-dist
          gh release download "${RELEASE_TAG}" --repo "${REPO}" \
            --pattern 'llama-server-*.zip' --dir realtimex-dist

          x64_asset="llama-server-linux-x64-cuda-${TAG}.zip"
          if grep -Fxq "$x64_asset" <<< "$release_assets"; then
            x64_uploaded=true
          else
            x64_uploaded=false
          fi
          if [[ "$x64_uploaded" != "true" ]]; then
            cp "built-x64/${x64_asset}" "realtimex-dist/${x64_asset}"
          fi
          test -f "realtimex-dist/${x64_asset}"

          python3 "${REALTIMEX_SCRIPTS}/build_runtime_manifest.py" \
            --dist-dir realtimex-dist \
            --tag "${RELEASE_TAG}" \
            --llama-cpp-release "${TAG}" \
            --out realtimex-dist/runtime-manifest.json \
            --require-official \
            --require-matrix-id linux-arm64-cuda \
            --require-matrix-id linux-x64-cuda \
            --github-output
          if [[ "$(jq -r '.complete' realtimex-dist/runtime-manifest.json)" != "true" ]]; then
            echo "Refusing to seal a release without all 12 runtime assets"
            exit 1
          fi

          if [[ "$x64_uploaded" != "true" ]]; then
            gh release upload "${RELEASE_TAG}" "realtimex-dist/${x64_asset}" \
              --repo "${REPO}"
          fi
          # The manifest is replaced last, so complete=true never points at a missing ZIP.
          gh release upload "${RELEASE_TAG}" realtimex-dist/runtime-manifest.json \
            --repo "${REPO}" --clobber

          notes="$(mktemp)"
          cat > "$notes" <<EOF
          # RealTimeX llama-server runtime \`${RELEASE_TAG}\`

          Pinned upstream: [ggml-org/llama.cpp \`${TAG}\`](https://github.com/ggml-org/llama.cpp/releases/tag/${TAG})

          Status: **complete**

          ## Contents
          Hybrid packaging for RealTimeX managed local LLM:
          - Official packs repacked with \`_nlcBuildMetadata.json\`
          - Self-built Linux CUDA runtimes

          See \`runtime-manifest.json\` for the full asset list and digests.

          ## Asset naming
          \`\`\`
          llama-server-{platform}-{arch}[-{cuda|vulkan}]-${TAG}.zip
          \`\`\`
          Compatible with RealTimeX startup downloader and runtime status.
          EOF
          if ! gh release edit "${RELEASE_TAG}" --repo "${REPO}" --notes-file "$notes"; then
            echo "Warning: release is complete, but its notes could not be refreshed"
          fi

          echo "Release ${RELEASE_TAG} is complete and immutable" >> "$GITHUB_STEP_SUMMARY"

  assemble-dry-run:
    name: Assemble dry-run artifacts
    needs:
      - validate-tag
      - repack-official
      - build-linux-cuda-x64
      - build-linux-cuda-arm64
    if: >-
      always()
      && !cancelled()
      && ! inputs.publish
      && ! inputs.repair_existing
      && needs.validate-tag.result == 'success'
      && (
        needs.repack-official.result == 'success'
        || needs.repack-official.result == 'failure'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          sparse-checkout: |
            realtimex
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Download all runtime artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: runtime-*
          merge-multiple: true

      - name: Collect dry-run zips
        id: collect
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
          RELEASE_TAG: ${{ needs.validate-tag.outputs.release_tag }}
          BUILD_X64: ${{ inputs.build_linux_cuda_x64 }}
          BUILD_ARM64: ${{ inputs.build_linux_cuda_arm64 }}
        run: |
          set -euo pipefail
          mkdir -p realtimex-dist
          find artifacts -type f -name 'llama-server-*.zip' -print0 | while IFS= read -r -d '' f; do
            cp -f "$f" realtimex-dist/
          done
          count="$(find realtimex-dist -type f -name 'llama-server-*.zip' | wc -l | tr -d ' ')"
          if [[ "$count" -lt 1 ]]; then
            echo "No runtime zips collected"
            exit 1
          fi

          manifest_args=(
            "${REALTIMEX_SCRIPTS}/build_runtime_manifest.py"
            --dist-dir realtimex-dist
            --tag "${RELEASE_TAG}"
            --llama-cpp-release "${TAG}"
            --out realtimex-dist/runtime-manifest.json
            --require-official
            --github-output
          )
          if [[ "$BUILD_X64" == "true" ]]; then
            manifest_args+=(--require-matrix-id linux-x64-cuda)
          fi
          if [[ "$BUILD_ARM64" == "true" ]]; then
            manifest_args+=(--require-matrix-id linux-arm64-cuda)
          fi
          python3 "${manifest_args[@]}"

      - name: Report dry-run completeness
        env:
          COMPLETE: ${{ steps.collect.outputs.complete }}
          EXPECTED_COUNT: ${{ steps.collect.outputs.expectedCount }}
          MISSING_COUNT: ${{ steps.collect.outputs.missingCount }}
        run: |
          echo "Dry run complete=${COMPLETE}; expected=${EXPECTED_COUNT}; missing=${MISSING_COUNT}" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined dry-run dist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: realtimex-runtime-${{ needs.validate-tag.outputs.tag }}
          path: |
            realtimex-dist/*.zip
            realtimex-dist/runtime-manifest.json
          if-no-files-found: error
          retention-days: 7
